# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release Plugin

on:
  push:
    branches:
      - 'fix/docker-persistence-and-buffer'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release
        run: |
          mkdir -p release/provisioning
          cp -r dist release/
          cp -r provisioning/dashboards release/provisioning/
          cp -r provisioning/datasources release/provisioning/
          cp docker-compose.yaml release/
          cp .config/docker-compose-base.yaml release/
          cp .config/Dockerfile release/
          cp README.md release/
          cp DEVELOPER.md release/
          cd release
          zip -r ../disguiseone-liveupdate-datasource-${{ github.ref_name }}.zip .
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'disguiseone-liveupdate-datasource-${{ github.ref_name }}.zip'
