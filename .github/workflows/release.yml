# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'fix/docker-persistence-and-buffer'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Sanitize ref name for filename
        id: sanitize_ref
        run: echo "ref_name_sanitized=$(echo ${{ github.ref_name }} | sed 's/\//-/g')" >> $GITHUB_OUTPUT

      - name: Package release
        run: |
          RELEASE_DIR="release"
          mkdir -p "${RELEASE_DIR}/.config"
          mkdir -p "${RELEASE_DIR}/provisioning"

          # Copy necessary files, preserving structure
          cp -r dist "${RELEASE_DIR}/"
          cp -r provisioning/dashboards "${RELEASE_DIR}/provisioning/"
          cp -r provisioning/datasources "${RELEASE_DIR}/provisioning/"
          cp docker-compose.yaml "${RELEASE_DIR}/"
          cp .config/Dockerfile "${RELEASE_DIR}/.config/"

          # Adjust docker-compose-base.yaml for release and copy it
          sed -e 's|context: ..|context: .|' \
              -e 's|- ../dist|- ./dist|' \
              -e 's|- ../provisioning|- ./provisioning|' \
              -e '/- ..:\/root\/disguiseone-liveupdate-datasource/d' \
              .config/docker-compose-base.yaml > "${RELEASE_DIR}/.config/docker-compose-base.yaml"

          # Create the zip file
          cd "${RELEASE_DIR}"
          zip -r "../disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip" .
        
      - name: Upload artifact for testing
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}
          path: disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 'disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip'
