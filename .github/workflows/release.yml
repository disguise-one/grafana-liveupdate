# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'fix/docker-persistence-and-buffer'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Sanitize ref name for filename
        id: sanitize_ref
        run: echo "ref_name_sanitized=$(echo ${{ github.ref_name }} | sed 's/\//-/g')" >> $GITHUB_OUTPUT

      - name: Assemble release files
        run: |
          RELEASE_DIR="release"
          mkdir -p "${RELEASE_DIR}/provisioning"
          mkdir -p "${RELEASE_DIR}/.config/supervisord"

          # Copy necessary files, preserving structure
          cp -r dist "${RELEASE_DIR}/"
          cp -r provisioning/dashboards "${RELEASE_DIR}/provisioning/"
          cp -r provisioning/datasources "${RELEASE_DIR}/provisioning/"
          cp .config/Dockerfile "${RELEASE_DIR}/.config/Dockerfile"
          cp .config/entrypoint.sh "${RELEASE_DIR}/.config/entrypoint.sh"
          cp .config/supervisord/supervisord.conf "${RELEASE_DIR}/.config/supervisord/supervisord.conf"
          cp docker-compose.release.yaml "${RELEASE_DIR}/docker-compose.yaml"
          cp README.md "${RELEASE_DIR}/"
          cp DEVELOPER.md "${RELEASE_DIR}/"
        
      - name: Upload artifact for testing
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}
          path: release/

      - name: Package release for tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd release
          zip -r "../disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip" .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 'disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip'
