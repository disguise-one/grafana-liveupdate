# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install pyinstaller git+https://github.com/disguise-one/python-plugin

      - name: Build Grafana Plugin
        run: npm run build

      - name: Build Python Advertiser EXE
        run: python build.py
      
      - name: Check if this is a pre-release
        id: check_prerelease
        run: |
          if ("${{ github.ref_name }}".Contains("-beta")) {
            "is_prerelease=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "is_prerelease=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        shell: pwsh

      - name: Package release
        run: |
          mkdir release
          mkdir release/advertiser
          mkdir release/provisioning
          cp -r dist release/
          cp -r provisioning/dashboards release/provisioning/
          cp -r provisioning/datasources release/provisioning/
          cp docker-compose.release.yaml release/docker-compose.yaml
          cp start-grafana.bat release/start-grafana.bat
          cp dist_advertiser/plugin_advertiser.exe release/advertiser/plugin_advertiser.exe
          cp README.md release/
          cp DEVELOPER.md release/
          Compress-Archive -Path release/* -DestinationPath "disguiseone-liveupdate-datasource-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "disguiseone-liveupdate-datasource-${{ github.ref_name }}.zip"
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
