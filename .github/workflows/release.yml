# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Sanitize ref name for filename
        id: sanitize_ref
        run: echo "ref_name_sanitized=$(echo ${{ github.ref_name }} | sed 's/\//-/g')" >> $GITHUB_OUTPUT

      - name: Check if this is a pre-release
        id: check_prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Package release
        run: |
          RELEASE_DIR="release"
          mkdir -p "${RELEASE_DIR}/provisioning"

          # Modify Dockerfile for release and copy to release dir
          sed -e 's|COPY .config/supervisord/supervisord.conf|COPY supervisord.conf|g' \
              -e 's|COPY .config/entrypoint.sh|COPY entrypoint.sh|g' \
              .config/Dockerfile > "${RELEASE_DIR}/Dockerfile"

          # Copy other necessary files to the root of the release dir
          cp .config/entrypoint.sh "${RELEASE_DIR}/entrypoint.sh"
          cp .config/supervisord/supervisord.conf "${RELEASE_DIR}/supervisord.conf"
          cp -r dist "${RELEASE_DIR}/"
          cp -r provisioning/dashboards "${RELEASE_DIR}/provisioning/"
          cp -r provisioning/datasources "${RELEASE_DIR}/provisioning/"
          cp docker-compose.release.yaml "${RELEASE_DIR}/docker-compose.yaml"
          cp README.md "${RELEASE_DIR}/"
          cp DEVELOPER.md "${RELEASE_DIR}/"

          # Create the zip file
          cd "${RELEASE_DIR}"
          zip -r "../disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip" .
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'disguiseone-liveupdate-datasource-${{ steps.sanitize_ref.outputs.ref_name_sanitized }}.zip'
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
